kind: module
name: do-scan-vuln
description: Hunt vulnerabilities on a single target with Nuclei
tags: vuln,nuclei,security,scanning

# -----------------------------------------------------------------------------
# PARAMS SECTION
# -----------------------------------------------------------------------------
params:
  - name: httpFile
    default: "{{Output}}/probing/http-{{TargetSpace}}.txt"

  - name: vigeniumJsonOutput
    default: "{{Output}}/vulnscan/vigenium-{{TargetSpace}}.jsonl"

  - name: vigeniumPrallel
    default: 5
# -----------------------------------------------------------------------------
# DEPENDENCIES SECTION
# -----------------------------------------------------------------------------
dependencies:
  commands:
    - vigenium

  variables:
    - name: Target
      type: string
      required: true

# -----------------------------------------------------------------------------
# REPORTS SECTION
# -----------------------------------------------------------------------------
reports:
  - name: vigenium-jsonl
    path: "{{vigeniumJsonOutput}}"
    type: jsonl
    description: vigenium deep vulnerability scan results in JSONL format

# -----------------------------------------------------------------------------
# STEPS SECTION
# -----------------------------------------------------------------------------
steps:
  # ---------------------------------------------------------------------------
  # Setup: Create output folders
  # ---------------------------------------------------------------------------
  - name: create-output-folders
    type: function
    log: "Creating output folders"
    functions:
      - 'create_folder("{{Output}}/vulnscan")'

  # ---------------------------------------------------------------------------
  # Web crawling with Katana
  # ---------------------------------------------------------------------------
  - name: vigenium-deep-vuln-scan
    type: foreach
    log: "Running vigenium deep vulnerability scan on discovered URLs"
    pre_condition: 'file_exists("{{httpFile}}")'
    input: "{{httpFile}}"
    variable: line
    threads: "{{vigeniumPrallel}}"
    step:
      name: vigenium-single-target
      type: bash
      command: 'vigenium scan -u [[line]] -o results.json'


